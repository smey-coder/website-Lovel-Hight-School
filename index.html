<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovea High School</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Dark Mode -->
<button id="darkToggle">🌙</button>

<!-- Header -->
<header class="header">
    <img src="image/logo_school.jpg" class="logo">
    <h1 style="font-family: 'Khmer M1';">វិទ្យាល័យល្វា - Lovea High School</h1>
</header>

<!-- Navigation -->
<nav class="nav">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
</nav>

<!-- Hero / Slider -->
<section class="slider">
    <img src="image/detail.jpg" class="slide active">
    <img src="image/detail01.jpg" class="slide">
    <img src="image/detail01.jpg" class="slide">
</section>

<!-- Content -->
<section class="content">
    <h2>ព័ត៌មានទូទៅ (General Information)</h2>
    <p>
        វិទ្យាល័យល្វា គឺជាគ្រឹះស្ថានសិក្សាសាធារណៈដ៏សំខាន់មួយ...
    </p>
</section>

<!-- Gallery -->
<section class="gallery">
    <img src="image/detail.jpg">
    <img src="image/detail01.jpg">
    <img src="image/detail01.jpg">
</section>

<!-- Info + Map -->
<section class="info-map">
    <div class="info">
        <p>អបអរសាទរវិទ្យាល័យ «ល្វា» 🏆</p>
        <img src="image/detail01.jpg">
    </div>

    <div class="map">
        <iframe 
            src="https://www.google.com/maps?q=13.3505627,102.9104758&output=embed"
            width="100%" 
            height="100%" 
            style="border:0;">
        </iframe>
    </div>
</section>

<!-- Footer -->
<footer>
    © 2026 Lovea High School
</footer>

<script src="main.js"></script>
</body>
</html>
